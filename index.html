<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taskflow</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Task<span>flow</span></h1>
      <span class="date" id="today-date"></span>
    </header>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="s-total">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="s-done">0</div>
        <div class="stat-label">Done</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="s-left">0</div>
        <div class="stat-label">Left</div>
      </div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-bar">
      <div class="progress-fill" id="progress" style="width:0%"></div>
    </div>

    <!-- Add Task Form -->
    <div class="add-form">
      <div class="add-row1">
        <input type="text" id="task-input" placeholder="Add a new task..." />
        <button class="btn-add" id="add-btn">+ Add</button>
      </div>
      <div class="add-row2">
        <select id="cat-sel">
          <option value="work">💼 Work</option>
          <option value="personal">🏠 Personal</option>
          <option value="health">❤️ Health</option>
          <option value="shopping">🛒 Shopping</option>
        </select>
        <select id="pri-sel">
          <option value="medium">🟡 Medium</option>
          <option value="high">🔴 High</option>
          <option value="low">🟢 Low</option>
        </select>
        <input type="date" id="due-input" />
        <input type="time" id="reminder-time" title="Set Reminder Time 🔔" placeholder="🔔 Reminder" />
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <input class="search" type="text" id="search-input" placeholder="Search tasks..." />
      <div class="filter-tabs">
        <button class="tab active" data-filter="all">All</button>
        <button class="tab" data-filter="active">Active</button>
        <button class="tab" data-filter="done">Done</button>
      </div>
      <select class="sort-select" id="sort-sel">
        <option value="created">↕ Date</option>
        <option value="priority">↕ Priority</option>
        <option value="due">↕ Due</option>
        <option value="alpha">↕ A–Z</option>
      </select>
    </div>

    <!-- Task List -->
    <div class="todo-list" id="todo-list"></div>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
      <span class="bottom-info" id="bottom-info"></span>
      <button class="btn-clear" id="clear-btn">Clear completed</button>
    </div>
  </div>

  <!-- Reminder Toast Notification -->
  <div class="reminder-toast" id="reminder-toast">
    <div class="toast-icon">🔔</div>
    <div class="toast-body">
      <div class="toast-title">Reminder!</div>
      <div class="toast-msg" id="toast-msg"></div>
    </div>
    <button class="toast-close" id="toast-close">✖</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
